name: Reset Demo Passwords — NexusRH CI

# DÉCLENCHEMENT EXCLUSIVEMENT MANUEL (workflow_dispatch)
# Pas de déclenchement sur push/PR : la rotation des credentials est une
# opération sensible qui doit être pilotée explicitement par un humain.
#
# OWASP A07 (Identification & Authentication) :
#  - Confirmation obligatoire via input "confirmation"
#  - Environment "preprod" (protection branch + reviewers GitHub)
#  - Image pinnée au SHA du dernier build (pas de latest mutable)
#  - Logs horodatés, traçables dans l'historique Actions
#  - Job standalone (pas de hook helm → ne casse jamais le rollout)
#
# Pour activer en production : changer "preprod" → "production" dans le
# environment et ajouter les approvers nécessaires.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible (namespace K8s)'
        required: true
        default: nexusrh-ci
        type: choice
        options: [ nexusrh-ci, nexusrh-prod ]

      mode:
        description: 'Mode d''exécution'
        required: true
        default: health-check
        type: choice
        options:
          - health-check  # Teste juste la connexion DB (recommandé d'abord)
          - dry-run       # Liste les comptes ciblés sans modifier
          - apply         # Reset effectif des 8 hashes bcrypt

      confirmation:
        description: 'Tapez RESET pour confirmer (mode apply uniquement)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  reset:
    name: Reset demo passwords (${{ inputs.mode }})
    runs-on: ubuntu-latest
    # Environment GitHub avec protection : reviewers requis avant exécution.
    # Configurer dans : Settings → Environments → preprod / production
    environment: ${{ inputs.target == 'nexusrh-prod' && 'production' || 'preprod' }}

    steps:
      - name: Vérifier confirmation si mode=apply
        if: inputs.mode == 'apply'
        run: |
          if [ "${{ inputs.confirmation }}" != "RESET" ]; then
            echo "::error::Mode 'apply' nécessite confirmation='RESET' (reçu: '${{ inputs.confirmation }}')"
            exit 1
          fi
          echo "✓ Confirmation validée"

      - uses: actions/checkout@v4

      - name: Configurer kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "::error::KUBECONFIG_PREPROD secret manquant"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
          kubectl cluster-info

      - name: Récupérer le SHA actuel de l'image API déployée
        id: image
        run: |
          IMAGE=$(kubectl get deployment nexusrh-api -n ${{ inputs.target }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "Image API actuellement déployée : $IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Cleanup jobs reset précédents (zombies éventuels)
        run: |
          kubectl delete jobs -n ${{ inputs.target }} \
            -l app.kubernetes.io/component=maintenance \
            --field-selector status.successful!=1 \
            --ignore-not-found
          echo "✓ Jobs zombies nettoyés"

      - name: Générer manifest Job standalone
        run: |
          # Determine command args based on mode
          case "${{ inputs.mode }}" in
            health-check) ARGS='["--health-check"]' ;;
            dry-run)      ARGS='["--dry-run"]' ;;
            apply)        ARGS='[]' ;;
          esac

          cat > /tmp/reset-job.yaml <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: reset-demo-passwords-${{ github.run_id }}
            namespace: ${{ inputs.target }}
            labels:
              app.kubernetes.io/component: maintenance
              triggered-by: github-actions
              triggered-mode: ${{ inputs.mode }}
              triggered-run: "${{ github.run_id }}"
          spec:
            ttlSecondsAfterFinished: 600
            backoffLimit: 0
            activeDeadlineSeconds: 300
            template:
              metadata:
                labels:
                  app.kubernetes.io/component: maintenance
              spec:
                restartPolicy: Never
                serviceAccountName: nexusrh-api
                automountServiceAccountToken: false
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1001
                  runAsGroup: 1001
                  seccompProfile:
                    type: RuntimeDefault
                initContainers:
                  - name: wait-postgres
                    image: busybox:1.36
                    command: [sh, -c, "until nc -z nexusrh-ci-postgres-postgresql 5432; do echo 'waiting postgres...'; sleep 3; done"]
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities: { drop: [ALL] }
                containers:
                  - name: reset
                    image: ${{ steps.image.outputs.image }}
                    imagePullPolicy: IfNotPresent
                    command: ["node", "dist/db/reset-admin-passwords.js"]
                    args: $ARGS
                    envFrom:
                      - configMapRef:
                          name: nexusrh-config
                      - secretRef:
                          name: nexusrh-app-secrets
                    env:
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: nexusrh-postgres-secret
                            key: postgres-password
                      - name: DATABASE_URL
                        value: "postgresql://nexusrh:\$(POSTGRES_PASSWORD)@nexusrh-ci-postgres-postgresql.${{ inputs.target }}.svc.cluster.local:5432/nexusrh"
                      # Autorise le reset en NODE_ENV=production (le script refuse
                      # sinon, exit 2). Le workflow exige déjà la confirmation
                      # "RESET" + l'environment GitHub protégé ; les comptes RÉELS
                      # restent protégés (protectReal) sauf RESET_REAL_ACCOUNTS.
                      - name: FORCE_RESET_PROD
                        value: "true"
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities: { drop: [ALL] }
                    volumeMounts:
                      - name: tmp
                        mountPath: /tmp
                volumes:
                  - name: tmp
                    emptyDir: {}
          EOF

          echo "── Manifest généré ──"
          cat /tmp/reset-job.yaml | head -20

      - name: Appliquer le Job
        run: |
          kubectl apply -f /tmp/reset-job.yaml
          echo "✓ Job créé : reset-demo-passwords-${{ github.run_id }}"

      - name: Attendre fin du Job (max 5 min)
        run: |
          JOB_NAME=reset-demo-passwords-${{ github.run_id }}
          echo "⏳ Attente fin du Job $JOB_NAME..."

          kubectl wait --for=condition=complete \
            --timeout=300s \
            -n ${{ inputs.target }} \
            job/$JOB_NAME 2>/dev/null && JOB_OK=true || JOB_OK=false

          # Récupérer les logs du pod (succès ou échec)
          echo ""
          echo "── Logs du Job ──"
          POD=$(kubectl get pods -n ${{ inputs.target }} \
            -l job-name=$JOB_NAME -o jsonpath='{.items[0].metadata.name}')
          kubectl logs -n ${{ inputs.target }} "$POD" -c reset 2>&1 || true

          if [ "$JOB_OK" = "false" ]; then
            echo ""
            echo "::error::Job a échoué — voir logs ci-dessus"
            kubectl describe pod -n ${{ inputs.target }} "$POD" 2>&1 | tail -40
            exit 1
          fi

          echo ""
          echo "✓ Job terminé avec succès"

      - name: Récap
        if: always()
        run: |
          echo "Mode exécuté : ${{ inputs.mode }}"
          echo "Namespace    : ${{ inputs.target }}"
          echo "Image utilisée : ${{ steps.image.outputs.image }}"
          echo "Job          : reset-demo-passwords-${{ github.run_id }}"
