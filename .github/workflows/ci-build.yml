name: Build → Preprod → Production

on:
  push:
    branches: [ main ]
    paths:
    - 'nexusrh_ci/apps/**'
    - 'nexusrh_ci/packages/**'
    - 'nexusrh_ci/pnpm-lock.yaml'
    - 'nexusrh_ci/helm/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible de déploiement'
        required: true
        default: preprod
        type: choice
        options: [ preprod, production ]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      owner: ${{ steps.owner.outputs.name }}
    steps:
    - uses: actions/checkout@v4

    - name: Short SHA
      id: sha
      run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Lowercase owner
      id: owner
      run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 1. Création d'un dossier pour isoler les rapports SARIF
    - name: Prepare SARIF directory
      run: mkdir -p sarif-results

    # --- Build & Scan API ---
    - name: Build & Push API
      id: build-api
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/api/Dockerfile
        target: production
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:sha-${{ steps.sha.outputs.short }}

    - name: Trivy scan API
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: sarif-results/trivy-api.sarif
        severity: CRITICAL,HIGH

    # --- Build & Scan Web ---
    - name: Build & Push Web
      id: build-web
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/web/Dockerfile
        target: runner
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:sha-${{ steps.sha.outputs.short }}

    - name: Trivy scan Web
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: sarif-results/trivy-web.sarif
        severity: CRITICAL,HIGH

    # --- Build & Scan Worker ---
    - name: Build & Push Worker
      id: build-worker
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/worker/Dockerfile
        target: production
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:sha-${{ steps.sha.outputs.short }}

    - name: Trivy scan Worker
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: sarif-results/trivy-worker.sarif
        severity: CRITICAL,HIGH

    # --- Upload des résultats ---
    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'sarif-results' # On donne le dossier contenant les 3 fichiers
        category: trivy-images

  deploy-preprod:
    name: Deploy → Preprod
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'preprod' || github.event.inputs.target == 'production'
    environment: preprod
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-helm@v4

    - name: Configure kubectl
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
      run: |
        mkdir -p ~/.kube
        printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config || printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Helm upgrade (preprod)
      run: |
        OWNER=${{ needs.build.outputs.owner }}
        SHA=${{ needs.build.outputs.short-sha }}
        helm dependency update nexusrh_ci/helm/nexusrh
        helm upgrade --install nexusrh-preprod nexusrh_ci/helm/nexusrh \
          --namespace nexusrh-preprod \
          --create-namespace \
          -f nexusrh_ci/helm/nexusrh/values.yaml \
          -f nexusrh_ci/helm/nexusrh/values-preprod.yaml \
          --set images.api.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-api \
          --set images.api.tag=sha-${SHA} \
          --set images.web.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-web \
          --set images.web.tag=sha-${SHA} \
          --set images.worker.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-worker \
          --set images.worker.tag=sha-${SHA} \
          --wait --timeout=10m
