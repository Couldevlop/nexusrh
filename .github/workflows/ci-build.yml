#name: CI — NexusRH CI (Côte d'Ivoire)

name: Build → Preprod → Production

on:
  push:
    branches: [ main ]
    paths:
    - 'nexusrh_ci/apps/**'
    - 'nexusrh_ci/packages/**'
    - 'nexusrh_ci/pnpm-lock.yaml'
    - 'nexusrh_ci/helm/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible de déploiement'
        required: true
        default: preprod
        type: choice
        options: [ preprod, production ]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io
  PNPM_VERSION: '9.1.0'

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      owner: ${{ steps.owner.outputs.name }}
    steps:
    - uses: actions/checkout@v4

    - name: Short SHA
      id: sha
      run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Lowercase owner
      id: owner
      run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: sigstore/cosign-installer@v3

    # --- API ---
    - name: Build & Push API
      id: build-api
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/api/Dockerfile
        target: production
        push: true
        provenance: true
        sbom: true
        tags: |
          ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:sha-${{ steps.sha.outputs.short }}
          ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:latest
        cache-from: type=gha,scope=api-v2
        cache-to: type=gha,mode=min,scope=api-v2

    - name: Sign API (keyless)
      run: cosign sign --yes ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api@${{ steps.build-api.outputs.digest }}

    # --- WEB ---
    - name: Build & Push Web
      id: build-web
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/web/Dockerfile
        target: runner
        push: true
        provenance: true
        sbom: true
        build-args: VITE_API_URL=https://api.openlabconsulting.com
        tags: |
          ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:sha-${{ steps.sha.outputs.short }}
          ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:latest
        cache-from: type=gha,scope=web-v2
        cache-to: type=gha,mode=min,scope=web-v2

    - name: Sign Web (keyless)
      run: cosign sign --yes ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web@${{ steps.build-web.outputs.digest }}

    # --- WORKER ---
    - name: Build & Push Worker
      id: build-worker
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/worker/Dockerfile
        target: production
        push: true
        provenance: true
        sbom: true
        tags: |
          ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:sha-${{ steps.sha.outputs.short }}
          ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:latest
        cache-from: type=gha,scope=worker-v2
        cache-to: type=gha,mode=min,scope=worker-v2

    - name: Sign Worker (keyless)
      run: cosign sign --yes ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker@${{ steps.build-worker.outputs.digest }}

    # --- TRIVY SCANS ---
    - name: Trivy scan API
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: trivy-api.sarif
        severity: CRITICAL,HIGH

    - name: Trivy scan Web
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: trivy-web.sarif
        severity: CRITICAL,HIGH

    - name: Trivy scan Worker
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: trivy-worker.sarif
        severity: CRITICAL,HIGH

    # --- UPLOAD SARIF (CORRECTED) ---
    - name: Upload API SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-api.sarif
        category: trivy-api

    - name: Upload Web SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-web.sarif
        category: trivy-web

    - name: Upload Worker SARIF
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-worker.sarif
        category: trivy-worker

  deploy-preprod:
    name: Deploy → Preprod
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'preprod' || github.event.inputs.target == 'production'
    environment: preprod
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-helm@v4

    - name: Configure kubectl
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
      run: |
        mkdir -p ~/.kube
        printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config || printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Helm upgrade (preprod)
      run: |
        OWNER=${{ needs.build.outputs.owner }}
        SHA=${{ needs.build.outputs.short-sha }}
        # On entre dans le dossier nexusrh_ci pour Helm
        helm dependency update nexusrh_ci/helm/nexusrh
        helm upgrade --install nexusrh-preprod nexusrh_ci/helm/nexusrh \
          --namespace nexusrh-preprod \
          --create-namespace \
          -f nexusrh_ci/helm/nexusrh/values.yaml \
          -f nexusrh_ci/helm/nexusrh/values-preprod.yaml \
          --set images.api.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-api \
          --set images.api.tag=sha-${SHA} \
          --set images.web.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-web \
          --set images.web.tag=sha-${SHA} \
          --set images.worker.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-worker \
          --set images.worker.tag=sha-${SHA} \
          --wait --timeout=10m

  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [ deploy-preprod ]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    environment: production
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-helm@v4

    - name: Configure kubectl
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PROD }}
      run: |
        mkdir -p ~/.kube
        printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config || printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Helm upgrade (production)
      run: |
        OWNER=${{ needs.build.outputs.owner }}
        SHA=${{ needs.build.outputs.short-sha }}
        helm dependency update nexusrh_ci/helm/nexusrh
        helm upgrade --install nexusrh nexusrh_ci/helm/nexusrh \
          --namespace nexusrh \
          --create-namespace \
          -f nexusrh_ci/helm/nexusrh/values.yaml \
          -f nexusrh_ci/helm/nexusrh/values-prod.yaml \
          --set images.api.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-api \
          --set images.api.tag=sha-${SHA} \
          --set images.web.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-web \
          --set images.web.tag=sha-${SHA} \
          --set images.worker.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-worker \
          --set images.worker.tag=sha-${SHA} \
          --wait --timeout=15m
