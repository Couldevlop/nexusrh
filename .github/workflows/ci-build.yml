name: CI — NexusRH CI (Côte d'Ivoire)

on:
  push:
    branches: [ main ]
    paths:
    - 'nexusrh_ci/apps/**'
    - 'nexusrh_ci/packages/**'
    - 'nexusrh_ci/pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: preprod
        type: choice
        options: [ preprod ]

env:
  REGISTRY: ghcr.io
  NAMESPACE: nexusrh-ci

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexusrh_ci
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with: { version: '9.4.0' }
    - uses: actions/setup-node@v4
      with: { node-version: '20', cache: pnpm, cache-dependency-path: nexusrh_ci/pnpm-lock.yaml }
    - run: pnpm install --frozen-lockfile
    - run: pnpm --filter @nexusrhci/api run type-check
    - run: pnpm --filter @nexusrhci/web run type-check
    - run: pnpm --filter @nexusrhci/worker run typecheck

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ typecheck ]
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        app: [ api, web, worker ]
    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v3
      with: { version: '9.4.0' }

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: pnpm
        cache-dependency-path: nexusrh_ci/pnpm-lock.yaml

    - name: Install & build on runner
      working-directory: nexusrh_ci
      run: |
        pnpm install --frozen-lockfile
        pnpm --filter @nexusrhci/${{ matrix.app }} run build

    - name: Get pnpm store path
      id: pnpm-store
      run: echo "path=$(pnpm store path)" >> $GITHUB_OUTPUT

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Lowercase owner
      id: owner
      run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-ci-${{ matrix.app }}
        tags: |
          type=sha,prefix=sha-,format=short
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build & Push
      uses: docker/build-push-action@v6
      with:
        context: nexusrh_ci
        file: nexusrh_ci/apps/${{ matrix.app }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha,scope=ci-${{ matrix.app }}-v5
        cache-to: type=gha,mode=min,scope=ci-${{ matrix.app }}-v5
        build-contexts: pnpmstore=${{ steps.pnpm-store.outputs.path }}

    - name: Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-ci-${{ matrix.app }}:latest
        format: sarif
        output: trivy-${{ matrix.app }}.sarif
        severity: CRITICAL,HIGH
        exit-code: '0'

    - uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-${{ matrix.app }}.sarif

  deploy:
    name: Deploy → preprod (nexusrh-ci)
    runs-on: ubuntu-latest
    needs: [ docker ]
    environment: preprod
    steps:
    - uses: actions/checkout@v4

    - uses: azure/setup-helm@v4

    - name: Configure kubectl
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
      run: |
        mkdir -p ~/.kube
        if printf '%s' "$KUBECONFIG_DATA" | base64 -d 2>/dev/null | grep -q 'apiVersion:'; then
          printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
        else
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        fi
        chmod 600 ~/.kube/config
        # Set current-context to first available if missing
        if ! kubectl config current-context 2>/dev/null; then
          CTX=$(kubectl config get-contexts -o name 2>/dev/null | head -1)
          [ -n "$CTX" ] && kubectl config use-context "$CTX"
        fi
        kubectl cluster-info

    - name: Get short SHA
      id: sha
      run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

    - name: Helm upgrade
      run: |
        helm dependency update nexusrh_ci/k8s/charts/nexusrh
        helm upgrade --install nexusrh-ci nexusrh_ci/k8s/charts/nexusrh \
          --namespace nexusrh-ci \
          --create-namespace \
          -f nexusrh_ci/k8s/charts/nexusrh/values.yaml \
          --set images.api.repository=${{ env.REGISTRY }}/${{ github.repository_owner }}/nexusrh-ci-api \
          --set images.api.tag=sha-${{ steps.sha.outputs.short }} \
          --set images.web.repository=${{ env.REGISTRY }}/${{ github.repository_owner }}/nexusrh-ci-web \
          --set images.web.tag=sha-${{ steps.sha.outputs.short }} \
          --set images.worker.repository=${{ env.REGISTRY }}/${{ github.repository_owner }}/nexusrh-ci-worker \
          --set images.worker.tag=sha-${{ steps.sha.outputs.short }} \
          --set postgres.auth.password=${{ secrets.DB_PASSWORD_CI }} \
          --set redis.auth.password=${{ secrets.REDIS_PASSWORD_CI }} \
          --set minio.auth.rootPassword=${{ secrets.MINIO_PASSWORD_CI }} \
          --set meilisearch.auth.masterKey=${{ secrets.MEILI_MASTER_KEY_CI }} \
          --set api.secrets.jwtSecret=${{ secrets.JWT_SECRET_CI }} \
          --set api.secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
          --set api.secrets.smtpUser=${{ secrets.SMTP_USER }} \
          --set api.secrets.smtpPass=${{ secrets.SMTP_PASS }} \
          --set api.secrets.smtpFrom=${{ secrets.SMTP_FROM }} \
          --set networkPolicies.enabled=true \
          --set infra.enabled=false \
          --wait --timeout=10m \
          --rollback-on-failure

    - run: kubectl get pods -n nexusrh-ci
