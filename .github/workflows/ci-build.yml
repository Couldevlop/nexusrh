name: Build & Deploy — NexusRH CI

on:
  push:
    branches: [ main ]
    paths:
    - 'nexusrh_ci/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible de déploiement'
        required: true
        default: preprod
        type: choice
        options: [ preprod, production ]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      owner: ${{ steps.owner.outputs.name }}
    steps:
    - uses: actions/checkout@v4

    - name: Short SHA
      id: sha
      run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Lowercase owner
      id: owner
      run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Prepare SARIF directory
      if: always()
      run: mkdir -p sarif-results

    - uses: pnpm/action-setup@v4
      with:
        package_json_file: nexusrh_ci/package.json

    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: nexusrh_ci/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: nexusrh_ci

    - name: Build shared package
      run: pnpm --filter @nexusrhci/shared run build
      working-directory: nexusrh_ci

    - name: Build API (TypeScript → dist)
      run: pnpm --filter @nexusrhci/api run build
      working-directory: nexusrh_ci

    - name: Build Web (Vite → dist)
      run: pnpm --filter @nexusrhci/web run build
      working-directory: nexusrh_ci

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # --- Build & Scan API ---
    - name: Build & Push API
      uses: docker/build-push-action@v6
      with:
        context: ./nexusrh_ci
        file: ./nexusrh_ci/apps/api/Dockerfile
        push: true
        no-cache: true
        tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-ci-api:sha-${{ steps.sha.outputs.short }}

    - name: Trivy scan API
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-ci-api:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: sarif-results/trivy-api.sarif
        severity: CRITICAL,HIGH

    # --- Build & Scan Web ---
    - name: Build & Push Web
      uses: docker/build-push-action@v6
      with:
        context: ./nexusrh_ci
        file: ./nexusrh_ci/apps/web/Dockerfile
        push: true
        tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-ci-web:sha-${{ steps.sha.outputs.short }}

    - name: Trivy scan Web
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-ci-web:sha-${{ steps.sha.outputs.short }}
        format: sarif
        output: sarif-results/trivy-web.sarif
        severity: CRITICAL,HIGH

    - name: Upload SARIF — API
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: sarif-results/trivy-api.sarif
        category: trivy-api

    - name: Upload SARIF — Web
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: sarif-results/trivy-web.sarif
        category: trivy-web

  deploy:
    name: Deploy → ${{ github.event.inputs.target || 'preprod' }}
    runs-on: ubuntu-latest
    needs: [ build ]
    environment: ${{ github.event.inputs.target || 'preprod' }}
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-helm@v4

    - name: Configure kubectl
      env:
        KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
      run: |
        mkdir -p ~/.kube
        echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
        kubectl cluster-info

    - name: Helm upgrade
      # Seuls les tags d'image et le domaine transitent par le CI.
      # Les secrets applicatifs (JWT, DB, SMTP…) sont pré-créés directement
      # dans le cluster (kubectl create secret) et référencés via existingSecret.
      run: |
        OWNER=${{ needs.build.outputs.owner }}
        SHA=${{ needs.build.outputs.short-sha }}
        helm dependency update nexusrh_ci/k8s/charts/nexusrh
        helm upgrade --install nexusrh-ci nexusrh_ci/k8s/charts/nexusrh \
          --namespace nexusrh-ci --create-namespace \
          -f nexusrh_ci/k8s/charts/nexusrh/values.yaml \
          --set images.api.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-ci-api \
          --set images.api.tag=sha-${SHA} \
          --set images.web.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-ci-web \
          --set images.web.tag=sha-${SHA} \
          --set global.domain="${{ vars.DOMAIN }}" \
          --set global.apiDomain="${{ vars.API_DOMAIN }}" \
          --set api.secrets.existingSecret="nexusrh-app-secrets" \
          --set postgres.auth.existingSecret="nexusrh-postgres-secret" \
          --set redis.auth.existingSecret="nexusrh-redis-secret" \
          --set minio.auth.existingSecret="nexusrh-minio-secret" \
          --set meilisearch.auth.existingMasterKeySecret="nexusrh-meilisearch-secret" \
          --wait --timeout=10m
