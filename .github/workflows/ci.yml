name: Quality & Security — NexusRH CI

on:
  push:
    branches: [ main, develop, 'feat/**', 'fix/**', 'hotfix/**' ]
    paths: [ 'nexusrh_ci/**', '.github/workflows/**' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ 'nexusrh_ci/**' ]

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.1.0'

jobs:
  quality:
    name: TypeScript & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexusrh_ci # Force l'exécution dans le dossier CI
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with: { version: '${{ env.PNPM_VERSION }}' }
    - uses: actions/setup-node@v4
      with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm, cache-dependency-path: nexusrh_ci/pnpm-lock.yaml }

    - run: pnpm install --frozen-lockfile
    - run: pnpm run typecheck
    - run: pnpm run test

  security-scan:
    name: SAST & Secrets
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: { fetch-depth: 0 }

    # Audit des dépendances
    - name: Dependency Audit
      run: cd nexusrh_ci && pnpm audit --audit-level=high || true

    # Scan Trivy (Code source)
    - name: SAST — Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './nexusrh_ci'
        format: 'sarif'
        output: 'trivy-fs.sarif'
        severity: 'CRITICAL,HIGH'

    - uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-fs.sarif'
        category: trivy-filesystem
