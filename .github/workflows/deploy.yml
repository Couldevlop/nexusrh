name: Deploy â€” NexusRH

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: preprod
        type: choice
        options: [preprod, production]

env:
  REGISTRY: ghcr.io

jobs:
  deploy-k8s:
    name: Deploy Kubernetes â†’ ${{ github.event.inputs.environment || 'preprod' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'preprod' }}
    concurrency:
      group: deploy-k8s-${{ github.event.inputs.environment || 'preprod' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3
        with: { version: 'latest' }

      - uses: azure/setup-helm@v4
        with: { version: 'latest' }

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PREPROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Helm dependency update
        run: helm dependency update k8s/charts/nexusrh

      - name: Helm upgrade
        run: |
          helm upgrade --install nexusrh k8s/charts/nexusrh \
            --namespace nexusrh \
            --create-namespace \
            --set images.api.repository=${{ env.REGISTRY }}/${{ github.repository_owner }}/nexusrh/api \
            --set images.api.tag=sha-${{ steps.sha.outputs.short }} \
            --set images.web.repository=${{ env.REGISTRY }}/${{ github.repository_owner }}/nexusrh/web \
            --set images.web.tag=sha-${{ steps.sha.outputs.short }} \
            --set images.worker.repository=${{ env.REGISTRY }}/${{ github.repository_owner }}/nexusrh/worker \
            --set images.worker.tag=sha-${{ steps.sha.outputs.short }} \
            --set postgres.auth.password=${{ secrets.DB_PASSWORD }} \
            --set redis.auth.password=${{ secrets.REDIS_PASSWORD }} \
            --set minio.auth.rootPassword=${{ secrets.MINIO_PASSWORD }} \
            --set meilisearch.auth.masterKey=${{ secrets.MEILI_MASTER_KEY }} \
            --set api.secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set api.secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set api.secrets.smtpUser=${{ secrets.SMTP_USER }} \
            --set api.secrets.smtpPass=${{ secrets.SMTP_PASS }} \
            --set api.secrets.smtpFrom=${{ secrets.SMTP_FROM }} \
            --set networkPolicies.enabled=true \
            --set infra.enabled=false \
            --timeout 10m \
            --wait \
            --atomic

      - name: VĂ©rifier le dĂ©ploiement
        run: |
          kubectl rollout status deployment/nexusrh-api -n nexusrh --timeout=5m
          kubectl rollout status deployment/nexusrh-web -n nexusrh --timeout=5m
          kubectl get pods -n nexusrh
