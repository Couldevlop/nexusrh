name: Deploy — NexusRH CI (manuel)

# Déclenchement uniquement manuel.
# Le build et le déploiement automatique sont gérés par ci-build.yml.
# Ce workflow sert uniquement aux actions ponctuelles sur le cluster nexusrh-ci.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action à exécuter"
        required: true
        type: choice
        options:
          - seed          # (Re)jouer le seed de données de démo
          - rollout-restart  # Forcer le redémarrage des pods

permissions:
  contents: read

env:
  NAMESPACE: nexusrh-ci

jobs:
  run:
    name: "${{ github.event.inputs.action }} → nexusrh-ci"
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "❌ Le secret KUBECONFIG_PREPROD est vide"
            exit 1
          fi
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      # ── Rollout restart ──────────────────────────────────────────────────────
      - name: Rollout restart API + Web
        if: github.event.inputs.action == 'rollout-restart'
        run: |
          kubectl rollout restart deployment/nexusrh-api -n ${{ env.NAMESPACE }}
          kubectl rollout restart deployment/nexusrh-web -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/nexusrh-api -n ${{ env.NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/nexusrh-web -n ${{ env.NAMESPACE }} --timeout=180s
          echo "✅ Pods redémarrés"

      # ── Seed ────────────────────────────────────────────────────────────────
      - name: Attendre que l'API soit prête
        if: github.event.inputs.action == 'seed'
        run: |
          kubectl rollout status deployment/nexusrh-api \
            -n ${{ env.NAMESPACE }} --timeout=180s

      - name: Exécuter le seed
        if: github.event.inputs.action == 'seed'
        run: |
          API_POD=$(kubectl get pods -n ${{ env.NAMESPACE }} \
            -l app.kubernetes.io/component=api \
            --field-selector=status.phase=Running \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')

          if [ -z "$API_POD" ]; then
            echo "❌ Aucun pod API Running trouvé"
            exit 1
          fi

          echo "🌱 Seed sur pod: $API_POD"
          for i in 1 2 3; do
            kubectl exec -n ${{ env.NAMESPACE }} "$API_POD" -- node dist/db/seed.js && break
            echo "⚠️  Tentative $i échouée (tls transient), nouvelle tentative dans 10s..."
            sleep 10
          done
          echo "✅ Seed terminé"
