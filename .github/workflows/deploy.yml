name: Build → Preprod → Production

# Déclenché sur push main (chemins applicatifs) OU tag vX.Y.Z OU manuellement
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'helm/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible de déploiement'
        required: true
        default: preprod
        type: choice
        options: [preprod, production]

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write   # Cosign keyless signing (Sigstore OIDC)

env:
  REGISTRY: ghcr.io
  PNPM_VERSION: '9.1.0'

jobs:
  # ── Build & Push images (OWASP CICD-SEC-09 : intégrité des artefacts) ────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      owner:     ${{ steps.owner.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Cosign keyless (Sigstore) — aucune clé privée à stocker (OWASP CICD-SEC-06)
      - uses: sigstore/cosign-installer@v3

      # API
      - name: Build & Push API
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:latest
          cache-from: type=gha,scope=api-v2
          cache-to: type=gha,mode=min,scope=api-v2

      - name: Sign API (keyless Sigstore)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api@${{ steps.build-api.outputs.digest }}

      # Web
      - name: Build & Push Web
        id: build-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          push: true
          provenance: true
          sbom: true
          build-args: VITE_API_URL=https://api.openlabconsulting.com
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:latest
          cache-from: type=gha,scope=web-v2
          cache-to: type=gha,mode=min,scope=web-v2

      - name: Sign Web (keyless Sigstore)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web@${{ steps.build-web.outputs.digest }}

      # Worker
      - name: Build & Push Worker
        id: build-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          target: production
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:latest
          cache-from: type=gha,scope=worker-v2
          cache-to: type=gha,mode=min,scope=worker-v2

      - name: Sign Worker (keyless Sigstore)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker@${{ steps.build-worker.outputs.digest }}

      # Trivy scan — résultats dans GitHub Security tab (OWASP CICD-SEC-03)
      - name: Trivy scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-api:sha-${{ steps.sha.outputs.short }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Trivy scan Web
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-web:sha-${{ steps.sha.outputs.short }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Trivy scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/nexusrh-worker:sha-${{ steps.sha.outputs.short }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'
          category: trivy-images

  # ── Deploy Preprod (automatique après build) ─────────────────────────────────
  deploy-preprod:
    name: Deploy → Preprod
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'preprod' || github.event.inputs.target == 'production'
    environment: preprod    # Secrets injectés depuis Settings → Environments → preprod
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with: { version: 'latest' }

      # Validation kubeconfig (OWASP CICD-SEC-02)
      - name: Configure kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PREPROD }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "::error::KUBECONFIG_PREPROD absent."
            echo "::error::→ GitHub : Settings → Environments → preprod → Add secret → KUBECONFIG_PREPROD"
            echo "::error::→ Valeur : cat ~/.kube/config | base64 -w0"
            echo "::error::  Si le cluster est local (localhost), remplacez server: par l'IP publique."
            exit 1
          fi
          mkdir -p ~/.kube
          if printf '%s' "$KUBECONFIG_DATA" | base64 -d 2>/dev/null | grep -q 'apiVersion:'; then
            printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          else
            printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          fi
          chmod 600 ~/.kube/config
          if ! kubectl config current-context 2>/dev/null; then
            CTX=$(kubectl config get-contexts -o name 2>/dev/null | head -1)
            [ -n "$CTX" ] && kubectl config use-context "$CTX"
          fi
          kubectl cluster-info

      # Création idempotente des secrets k8s (aucun secret dans helm history — OWASP CICD-SEC-06)
      - name: Create k8s secrets (preprod)
        env:
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD }}
          MEILI_KEY:      ${{ secrets.MEILI_MASTER_KEY }}
          JWT_SECRET:     ${{ secrets.JWT_SECRET }}
          ANTHROPIC_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          SMTP_FROM:      ${{ secrets.SMTP_FROM }}
        run: |
          kubectl create namespace nexusrh-preprod --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic nexusrh-secrets \
            --from-literal=database-url="postgresql://nexusrh:${DB_PASSWORD}@nexusrh-preprod-postgresql:5432/nexusrh" \
            --from-literal=redis-url="redis://:${REDIS_PASSWORD}@nexusrh-preprod-redis-master:6379" \
            --from-literal=jwt-secret="${JWT_SECRET}" \
            --from-literal=anthropic-api-key="${ANTHROPIC_KEY}" \
            --from-literal=smtp-host="${SMTP_HOST:-smtp.gmail.com}" \
            --from-literal=smtp-user="${SMTP_USER}" \
            --from-literal=smtp-pass="${SMTP_PASS}" \
            --from-literal=smtp-from="${SMTP_FROM}" \
            --from-literal=s3-access-key="minioadmin" \
            --from-literal=s3-secret-key="${MINIO_PASSWORD}" \
            --namespace nexusrh-preprod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade (preprod)
        run: |
          OWNER=${{ needs.build.outputs.owner }}
          SHA=${{ needs.build.outputs.short-sha }}
          helm dependency update helm/nexusrh
          helm upgrade --install nexusrh-preprod helm/nexusrh \
            --namespace nexusrh-preprod \
            --create-namespace \
            -f helm/nexusrh/values.yaml \
            -f helm/nexusrh/values-preprod.yaml \
            --set images.api.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-api \
            --set images.api.tag=sha-${SHA} \
            --set images.web.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-web \
            --set images.web.tag=sha-${SHA} \
            --set images.worker.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-worker \
            --set images.worker.tag=sha-${SHA} \
            --set secrets.existingSecret=nexusrh-secrets \
            --wait --timeout=10m \
            --rollback-on-failure

      - name: Smoke tests (preprod)
        run: |
          kubectl wait deployment/nexusrh-preprod-api \
            -n nexusrh-preprod --for=condition=available --timeout=120s
          kubectl port-forward svc/nexusrh-preprod-api 4000:4000 -n nexusrh-preprod &
          sleep 5
          curl -sf http://localhost:4000/health \
            && echo "✅ API preprod OK" \
            || (echo "::error::Health check preprod échoué" && exit 1)

  # ── Promote → Production (approbation manuelle obligatoire) ──────────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [deploy-preprod]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    # ⚠️ OBLIGATOIRE : Settings → Environments → production → Required reviewers
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with: { version: 'latest' }

      - name: Configure kubectl
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "::error::KUBECONFIG_PROD absent → Settings → Environments → production → Add secret"
            exit 1
          fi
          mkdir -p ~/.kube
          if printf '%s' "$KUBECONFIG_DATA" | base64 -d 2>/dev/null | grep -q 'apiVersion:'; then
            printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          else
            printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          fi
          chmod 600 ~/.kube/config
          if ! kubectl config current-context 2>/dev/null; then
            CTX=$(kubectl config get-contexts -o name 2>/dev/null | head -1)
            [ -n "$CTX" ] && kubectl config use-context "$CTX"
          fi
          kubectl cluster-info

      - name: Create k8s secrets (production)
        env:
          DB_PASSWORD:    ${{ secrets.DB_PASSWORD_PROD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD_PROD }}
          MINIO_PASSWORD: ${{ secrets.MINIO_PASSWORD_PROD }}
          JWT_SECRET:     ${{ secrets.JWT_SECRET_PROD }}
          ANTHROPIC_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:      ${{ secrets.SMTP_HOST }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASS:      ${{ secrets.SMTP_PASS }}
          SMTP_FROM:      ${{ secrets.SMTP_FROM }}
        run: |
          kubectl create namespace nexusrh --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic nexusrh-secrets \
            --from-literal=database-url="postgresql://nexusrh:${DB_PASSWORD}@nexusrh-postgresql:5432/nexusrh" \
            --from-literal=redis-url="redis://:${REDIS_PASSWORD}@nexusrh-redis-master:6379" \
            --from-literal=jwt-secret="${JWT_SECRET}" \
            --from-literal=anthropic-api-key="${ANTHROPIC_KEY}" \
            --from-literal=smtp-host="${SMTP_HOST:-smtp.gmail.com}" \
            --from-literal=smtp-user="${SMTP_USER}" \
            --from-literal=smtp-pass="${SMTP_PASS}" \
            --from-literal=smtp-from="${SMTP_FROM}" \
            --from-literal=s3-access-key="minioadmin" \
            --from-literal=s3-secret-key="${MINIO_PASSWORD}" \
            --namespace nexusrh \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade (production)
        run: |
          OWNER=${{ needs.build.outputs.owner }}
          SHA=${{ needs.build.outputs.short-sha }}
          helm dependency update helm/nexusrh
          helm upgrade --install nexusrh helm/nexusrh \
            --namespace nexusrh \
            --create-namespace \
            -f helm/nexusrh/values.yaml \
            -f helm/nexusrh/values-prod.yaml \
            --set images.api.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-api \
            --set images.api.tag=sha-${SHA} \
            --set images.web.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-web \
            --set images.web.tag=sha-${SHA} \
            --set images.worker.repository=${{ env.REGISTRY }}/${OWNER}/nexusrh-worker \
            --set images.worker.tag=sha-${SHA} \
            --set secrets.existingSecret=nexusrh-secrets \
            --wait --timeout=15m \
            --rollback-on-failure

      - name: Health checks (production)
        run: |
          kubectl rollout status deployment/nexusrh-api -n nexusrh --timeout=5m
          kubectl rollout status deployment/nexusrh-web -n nexusrh --timeout=5m
          kubectl get pods -n nexusrh
          echo "### 🚀 Production déployée" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag : sha-${{ needs.build.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL : https://nexusrh.openlabconsulting.com" >> $GITHUB_STEP_SUMMARY
