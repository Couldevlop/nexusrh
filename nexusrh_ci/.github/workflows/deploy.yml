name: Deploy to Preprod

on:
  workflow_run:
    workflows: [Build & Push Images]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Helm deploy → preprod
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: preprod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PREPROD }}

      - name: Helm upgrade
        run: |
          helm dependency update k8s/charts/nexusrh
          helm upgrade --install nexusrh k8s/charts/nexusrh \
            --namespace nexusrh \
            --create-namespace \
            -f k8s/charts/nexusrh/values.yaml \
            --set images.api.repository=ghcr.io/${{ github.repository_owner }}/nexusrh-ci-api \
            --set images.api.tag=sha-${{ steps.sha.outputs.short }} \
            --set images.web.repository=ghcr.io/${{ github.repository_owner }}/nexusrh-ci-web \
            --set images.web.tag=sha-${{ steps.sha.outputs.short }} \
            --set images.worker.repository=ghcr.io/${{ github.repository_owner }}/nexusrh-ci-worker \
            --set images.worker.tag=sha-${{ steps.sha.outputs.short }} \
            --set postgres.auth.password=${{ secrets.DB_PASSWORD }} \
            --set redis.auth.password=${{ secrets.REDIS_PASSWORD }} \
            --set minio.auth.rootPassword=${{ secrets.MINIO_PASSWORD }} \
            --set meilisearch.auth.masterKey=${{ secrets.MEILI_MASTER_KEY }} \
            --set api.secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set api.secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set api.secrets.smtpUser=${{ secrets.SMTP_USER }} \
            --set api.secrets.smtpPass=${{ secrets.SMTP_PASS }} \
            --set api.secrets.smtpFrom=${{ secrets.SMTP_FROM }} \
            --set networkPolicies.enabled=true \
            --set infra.enabled=false \
            --wait --timeout=10m

      - name: Vérifier le déploiement
        run: kubectl get pods -n nexusrh
