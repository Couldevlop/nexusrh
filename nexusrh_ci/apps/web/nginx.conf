server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Resolver injecté dynamiquement par docker-entrypoint.sh depuis /etc/resolv.conf
    # Requis pour que proxy_pass avec variable $api_backend ne bloque pas le démarrage nginx
    include /tmp/kube-resolver.conf;

    # Proxy vers l'API — variable pour résolution DNS à la requête (pas au démarrage)
    set $api_backend http://api-svc.nexusrh-ci.svc.cluster.local:4001;
    location /api/ {
        proxy_pass $api_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # index.html — jamais mis en cache (point d'entrée SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        try_files $uri =404;
    }

    # Assets Vite (noms hachés) — cache long + try_files strict
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # En-têtes de sécurité
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    location = /favicon.ico { access_log off; log_not_found off; }
}
