server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Resolver injecté dynamiquement par docker-entrypoint.sh depuis /etc/resolv.conf
    # Requis pour que proxy_pass avec variable $api_backend ne bloque pas le démarrage nginx
    include /tmp/kube-resolver.conf;

    # Proxy vers l'API — variable pour résolution DNS à la requête (pas au démarrage)
    set $api_backend http://api-svc.nexusrh-ci.svc.cluster.local:4001;
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # index.html — jamais mis en cache (point d'entrée SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        try_files $uri =404;
    }

    # Assets Vite (noms hachés) — cache long + try_files strict
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # En-têtes de sécurité (OWASP A05 — Security Misconfiguration)
    # Note : `always` requis pour qu'ils s'appliquent aussi sur 4xx/5xx.
    add_header X-Content-Type-Options       "nosniff"                                                   always;
    add_header X-Frame-Options              "DENY"                                                      always;
    add_header X-XSS-Protection             "0"                                                         always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"                           always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=()"     always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload"             always;
    add_header Cross-Origin-Resource-Policy "same-origin"                                               always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                                               always;

    # Content-Security-Policy — calibré pour SPA Vite + Tailwind
    # - script-src: 'self' uniquement (pas de CDN scripts)
    # - style-src: 'self' + 'unsafe-inline' (Tailwind JIT + composants shadcn)
    # - img-src: 'self' + data: (logos SVG inline tenant) + https: (avatars éventuels)
    # - connect-src: 'self' (API via /api/* proxy nginx)
    # - frame-ancestors 'none' = même protection que X-Frame-Options: DENY
    # - upgrade-insecure-requests pour forcer HTTPS si HSTS appliqué
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # OWASP A02 — Cache-Control no-store sur bulletins paie PDF / exports CSV /
    # déclarations XML reçus via le proxy /api/* (évite la fuite via cache navigateur
    # partagé sur poste RH). L'API backend pose déjà ces headers ; nginx les conserve.

    location = /favicon.ico { access_log off; log_not_found off; }
}
