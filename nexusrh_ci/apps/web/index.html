<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E85D04" />
    <!-- OWASP A05 — défense en profondeur : meta CSP en fallback si nginx
         n'est pas devant (dev local, environnement de test). En prod, nginx.conf
         définit le header HTTP qui prévaut. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:4001 ws://localhost:4001; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" />
    <!-- Données RH sensibles : ne pas indexer dans les moteurs de recherche -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>NexusRH CI — SIRH Côte d'Ivoire</title>
    <meta name="description" content="NexusRH CI — La RH Intelligente, au service de l'Afrique qui avance. SIRH SaaS conforme CNPS 2024 & Code du Travail CI." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
