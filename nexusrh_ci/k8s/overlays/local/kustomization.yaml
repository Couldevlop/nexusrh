apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - secrets.yaml        # généré par scripts/generate-secrets.sh (gitignored)

namePrefix: ""
namespace: nexusrh

patches:
  - path: patches.yaml
    target:
      kind: Ingress
      name: nexusrh-ingress
  - path: node-selector-patch.yaml
    target:
      kind: Deployment
  - path: node-selector-patch.yaml
    target:
      kind: StatefulSet

images:
  - name: nexusrh/api
    newTag: local
  - name: nexusrh/web
    newTag: local
  - name: nexusrh/worker
    newTag: local

configMapGenerator:
  - name: nexusrh-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - APP_URL=https://nexusrh.local
      - API_URL=https://api.nexusrh.local
