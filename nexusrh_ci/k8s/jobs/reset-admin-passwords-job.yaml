apiVersion: batch/v1
kind: Job
metadata:
  name: nexusrh-reset-passwords
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: maintenance
spec:
  ttlSecondsAfterFinished: 1800
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: maintenance
    spec:
      restartPolicy: Never
      serviceAccountName: nexusrh-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres-svc 5432; do echo 'waiting postgres...'; sleep 3; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
      containers:
        - name: reset
          image: ghcr.io/couldevlop/nexusrh-api:prod
          imagePullPolicy: Always
          # Reset des mots de passe admin sans relancer le seed complet.
          # Idempotent — peut être appliqué plusieurs fois.
          command: ["node", "dist/db/reset-admin-passwords.js"]
          env:
            # Lève le garde-fou prod (sinon le script refuse de tourner en
            # NODE_ENV=production et sort en exit 2). Ce job ne réinitialise QUE
            # les comptes de DÉMO ; les comptes réels (super_admin, OpenLab) sont
            # protégés. Pour une récupération ciblée du super_admin en prod,
            # lancer un run ponctuel avec RESET_REAL_ACCOUNTS=true (voir README).
            - name: FORCE_RESET_PROD
              value: "true"
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
      volumes:
        - name: tmp
          emptyDir: {}
