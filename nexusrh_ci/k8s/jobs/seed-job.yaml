apiVersion: batch/v1
kind: Job
metadata:
  name: nexusrh-seed
  # Changer le namespace selon l'environnement :
  #   staging  → nexusrh-staging
  #   prod     → nexusrh
  namespace: nexusrh-staging
  labels:
    app.kubernetes.io/component: seed
    app.kubernetes.io/managed-by: kubectl
  annotations:
    # Horodatage pour forcer la recréation si on rejoue le job
    seeded-at: "FILL_WITH_DATE"
spec:
  ttlSecondsAfterFinished: 3600   # auto-nettoyage 1h après
  backoffLimit: 1                  # 1 seul retry
  template:
    metadata:
      labels:
        app.kubernetes.io/component: seed
    spec:
      restartPolicy: Never
      serviceAccountName: nexusrh-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres-svc 5432; do echo 'waiting postgres...'; sleep 3; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
      containers:
        - name: seed
          image: ghcr.io/couldevlop/nexusrh-api:staging   # même image que l'API
          imagePullPolicy: Always
          command: ["node", "dist/db/seed.js"]
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: tmp
          emptyDir: {}
