apiVersion: batch/v1
kind: Job
metadata:
  name: nexusrh-migrate-tenants
  # Namespace aligné sur le déploiement réel (ci-build.yml → helm --namespace nexusrh-ci).
  namespace: nexusrh-ci
  labels:
    app.kubernetes.io/component: maintenance
  annotations:
    # Migration idempotente des schémas tenants (colonnes multi-pays + bascule
    # clé d'unicité pay_periods). À (re)lancer après un déploiement qui fait
    # évoluer provisionTenantSchema(). Sans risque sur les données RH.
    # NB : le seed automatique du deploy couvre déjà les tenants démo
    # (SOTRA/Cabinet/OpenLab) ; ce Job couvre les AUTRES tenants (clients).
    migrated-at: "FILL_WITH_DATE"
spec:
  ttlSecondsAfterFinished: 1800
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: maintenance
    spec:
      restartPolicy: Never
      # SA par défaut : le Job n'a besoin que du réseau + DB (aucun accès API K8s).
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate-tenants
          # Image alignée sur ci-build.yml (tag :latest poussé à chaque deploy main).
          image: ghcr.io/couldevlop/nexusrh-ci-api:latest
          imagePullPolicy: Always
          # Boucle sur tous les platform.tenants et applique provisionTenantSchema
          # (idempotent). Le script fait un fail-fast sur la connexion DB, donc
          # pas besoin d'initContainer d'attente. Exit != 0 si un tenant échoue
          # => Job marqué Failed (OWASP A09 : aucune erreur silencieuse).
          command: ["node", "dist/db/migrate-tenants.js"]
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
      volumes:
        - name: tmp
          emptyDir: {}
