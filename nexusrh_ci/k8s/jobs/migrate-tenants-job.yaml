apiVersion: batch/v1
kind: Job
metadata:
  name: nexusrh-migrate-tenants
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: maintenance
  annotations:
    # Migration idempotente des schémas tenants (colonnes multi-pays + bascule
    # clé d'unicité pay_periods). À (re)lancer après chaque déploiement qui fait
    # évoluer provisionTenantSchema(). Sans risque sur les données RH.
    migrated-at: "FILL_WITH_DATE"
spec:
  ttlSecondsAfterFinished: 1800
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: maintenance
    spec:
      restartPolicy: Never
      serviceAccountName: nexusrh-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres-svc 5432; do echo 'waiting postgres...'; sleep 3; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
      containers:
        - name: migrate-tenants
          image: ghcr.io/couldevlop/nexusrh-api:prod
          imagePullPolicy: Always
          # Boucle sur tous les platform.tenants et applique provisionTenantSchema
          # (idempotent). Exit ≠ 0 si un tenant échoue ⇒ Job marqué Failed.
          command: ["node", "dist/db/migrate-tenants.js"]
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
      volumes:
        - name: tmp
          emptyDir: {}
