# Job de diagnostic — lance manuellement le script reset-admin-passwords
# avec la même config (configmap + secret) que le hook helm, mais sans les
# annotations helm pour éviter les conflits.
#
# Utilisation :
#   kubectl apply -f nexusrh_ci/k8s/jobs/debug-reset-passwords.yaml
#   kubectl logs -n nexusrh-ci job/debug-reset-passwords --follow
#   # Pour relancer après modif :
#   kubectl delete -f nexusrh_ci/k8s/jobs/debug-reset-passwords.yaml
#   kubectl apply -f nexusrh_ci/k8s/jobs/debug-reset-passwords.yaml
#
# Le pod attend Postgres, puis lance le script avec --dry-run d'abord
# (pour tester la connexion DB sans modifier les hashes).
apiVersion: batch/v1
kind: Job
metadata:
  name: debug-reset-passwords
  namespace: nexusrh-ci
  labels:
    app.kubernetes.io/component: maintenance
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: maintenance
    spec:
      restartPolicy: Never
      serviceAccountName: nexusrh-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z nexusrh-ci-postgres-postgresql 5432; do echo 'waiting postgres...'; sleep 3; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
      containers:
        - name: reset
          image: ghcr.io/couldevlop/nexusrh-ci-api:latest
          imagePullPolicy: Always
          # 1er run en dry-run pour valider connexion DB + liste cibles
          # sans risquer de casser les passwords existants.
          command: ["node", "dist/db/reset-admin-passwords.js", "--dry-run"]
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          env:
            # Force l'URL DB explicite (cas où ConfigMap n'a pas DATABASE_URL)
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-postgres-secret
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://nexusrh:$(POSTGRES_PASSWORD)@nexusrh-ci-postgres-postgresql.nexusrh-ci.svc.cluster.local:5432/nexusrh"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
