# ── Worker BullMQ — Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusrh-worker
  namespace: nexusrh
  labels:
    app.kubernetes.io/name: nexusrh-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: nexusrh-worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        tier: app
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command: [sh, -c, "until nc -z redis-svc 6379; do echo waiting; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: worker
          image: nexusrh/worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command: [node, -e, "require('./dist/health-check.js')"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
