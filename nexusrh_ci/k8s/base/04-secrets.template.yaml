# ── TEMPLATE secrets — NE PAS COMMITTER avec de vraies valeurs ─────────────────
# Usage : cp 04-secrets.template.yaml ../overlays/local/secrets.yaml
#          puis remplir les valeurs (base64) ou utiliser generate-secrets.sh
#
# OWASP A02 : tous les secrets chiffrés au repos via etcd encryption (voir deploy.sh)
# Pour la prod : utiliser Sealed Secrets ou External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: nexusrh-app-secrets
  namespace: nexusrh
  annotations:
    # Annotation pour rotation automatique (External Secrets Operator en prod)
    secrets.nexusrh.io/rotation-policy: "30d"
type: Opaque
stringData:
  # ── Base de données ───────────────────────────────────────────────────────────
  DATABASE_URL: "postgresql://nexusrh:CHANGE_ME@postgres-svc.nexusrh.svc.cluster.local:5432/nexusrh"
  POSTGRES_USER: "nexusrh"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "nexusrh"

  # ── JWT (min 32 chars, généré par generate-secrets.sh) ───────────────────────
  JWT_SECRET: "CHANGE_ME_MIN_32_CHARS"

  # ── Redis (si AUTH activé) ────────────────────────────────────────────────────
  REDIS_PASSWORD: "CHANGE_ME"

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  S3_ACCESS_KEY: "nexusrh-minio"
  S3_SECRET_KEY: "CHANGE_ME_MIN_16_CHARS"
  MINIO_ROOT_USER: "nexusrh-minio"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_MIN_16_CHARS"

  # ── Meilisearch ───────────────────────────────────────────────────────────────
  MEILISEARCH_MASTER_KEY: "CHANGE_ME"

  # ── Anthropic IA ──────────────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: "sk-ant-api03-CHANGE_ME"

  # ── Email ─────────────────────────────────────────────────────────────────────
  SMTP_HOST: "smtp.gmail.com"
  SMTP_USER: "CHANGE_ME@gmail.com"
  SMTP_PASS: "CHANGE_ME_APP_PASSWORD"
  SMTP_FROM: "NexusRH <CHANGE_ME@gmail.com>"

  # ── OAuth (optionnel) ─────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
  MICROSOFT_TENANT_ID: "common"
