# ── Namespace ──────────────────────────────────────────────────────────────────
# OWASP K8s-SEC-01 : isolation namespace + Pod Security Standards (restricted)
apiVersion: v1
kind: Namespace
metadata:
  name: nexusrh
  labels:
    # Enforce restricted PSS (pas de root, pas de privilege, read-only FS)
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    app.kubernetes.io/managed-by: kustomize
---
# ── LimitRange — évite les pods sans limites (CIS 5.1.3) ───────────────────────
apiVersion: v1
kind: LimitRange
metadata:
  name: nexusrh-limits
  namespace: nexusrh
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "8"
        memory: "16Gi"
    - type: PersistentVolumeClaim
      max:
        storage: "50Gi"
---
# ── ResourceQuota — plafond namespace (CIS 5.7.4) ──────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nexusrh-quota
  namespace: nexusrh
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "50"
    services: "20"
    persistentvolumeclaims: "20"
    secrets: "50"
    configmaps: "30"
