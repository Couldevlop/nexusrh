# ── ConfigMap — valeurs non-sensibles uniquement (OWASP A02) ───────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusrh-config
  namespace: nexusrh
data:
  NODE_ENV: "production"
  APP_NAME: "NexusRH"
  API_PORT: "4000"
  LOG_LEVEL: "info"
  # URLs internes k8s (service DNS)
  DATABASE_HOST: "postgres-svc.nexusrh.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "nexusrh"
  DATABASE_POOL_MIN: "2"
  DATABASE_POOL_MAX: "10"
  REDIS_URL: "redis://redis-svc.nexusrh.svc.cluster.local:6379"
  S3_ENDPOINT: "http://minio-svc.nexusrh.svc.cluster.local:9000"
  S3_BUCKET: "nexusrh"
  S3_REGION: "eu-west-1"
  S3_FORCE_PATH_STYLE: "true"
  MEILISEARCH_URL: "http://meilisearch-svc.nexusrh.svc.cluster.local:7700"
  MFA_ISSUER: "NexusRH"
  JWT_EXPIRES_IN: "7d"
  JWT_REFRESH_EXPIRES_IN: "30d"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  FEATURE_AI_ASSISTANT: "true"
  FEATURE_PREDICTIVE_ANALYTICS: "true"
  FEATURE_ELECTRONIC_SIGNATURE: "true"
  FEATURE_MULTI_COUNTRY: "false"
  FEATURE_KIOSK_MODE: "true"
  AI_MODEL: "claude-sonnet-4-20250514"
  AI_MAX_TOKENS: "4096"
