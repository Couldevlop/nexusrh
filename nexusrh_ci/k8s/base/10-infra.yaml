# ── INFRASTRUCTURE — PostgreSQL, Redis, MinIO, Meilisearch ─────────────────────
# Tous les containers : non-root, read-only FS, pas de privilege (OWASP A05)

# ═══════════════════════════════════════════════════════════════════════════════
# PostgreSQL 16
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: postgres
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nexusrh
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
    spec:
      serviceAccountName: nexusrh-infra
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        tier: infra
      tolerations:
        - key: tier
          operator: Equal
          value: infra
          effect: NoSchedule
      containers:
        - name: postgres
          image: postgres:16.3-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # postgres a besoin d'écrire /tmp
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
          livenessProbe:
            exec:
              command: [pg_isready, -U, nexusrh, -d, nexusrh]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: [pg_isready, -U, nexusrh, -d, nexusrh]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless pour StatefulSet
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: nexusrh
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres

# ═══════════════════════════════════════════════════════════════════════════════
# Redis 7
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: redis
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: nexusrh
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    appendonly yes
    protected-mode yes
    requirepass REDIS_PASSWORD_PLACEHOLDER
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: nexusrh
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: redis
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: nexusrh-infra
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        tier: infra
      initContainers:
        - name: config-init
          image: busybox:1.36
          command: [sh, -c]
          args:
            - |
              sed "s/REDIS_PASSWORD_PLACEHOLDER/${REDIS_PASSWORD}/" /tmp/redis.conf > /data/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-config-tpl
              mountPath: /tmp/redis.conf
              subPath: redis.conf
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command: [redis-server, /data/redis.conf]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: [redis-cli, -a, "$(REDIS_PASSWORD)", ping]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config-tpl
          configMap:
            name: redis-config
        - name: data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: redis
spec:
  selector:
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: 6379

# ═══════════════════════════════════════════════════════════════════════════════
# MinIO (S3-compatible)
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: minio
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: nexusrh
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: minio
spec:
  serviceName: minio-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/component: minio
    spec:
      serviceAccountName: nexusrh-infra
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        tier: infra
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-06-13T22-53-53Z
          imagePullPolicy: IfNotPresent
          command: [minio, server, /data, --console-address, ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio-svc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: minio
spec:
  selector:
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

# ═══════════════════════════════════════════════════════════════════════════════
# Meilisearch
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-pvc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: meilisearch
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: nexusrh
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/component: meilisearch
spec:
  serviceName: meilisearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/component: meilisearch
    spec:
      serviceAccountName: nexusrh-infra
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        tier: infra
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7700
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: MEILISEARCH_MASTER_KEY
            - name: MEILI_DB_PATH
              value: /meili_data
            - name: MEILI_ENV
              value: production
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /meili_data
          livenessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 7700
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: meilisearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch-svc
  namespace: nexusrh
  labels:
    app.kubernetes.io/component: meilisearch
spec:
  selector:
    app.kubernetes.io/component: meilisearch
  ports:
    - port: 7700
      targetPort: 7700
