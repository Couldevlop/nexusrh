# values.prod.yaml — Surcharges production k3s / Hetzner

global:
  domain: nexusrh.openlabconsulting.com
  apiDomain: api.nexusrh.openlabconsulting.com
  imagePullPolicy: Always
  imagePullSecrets:
    - name: ghcr-pull-secret

images:
  api:
    repository: ghcr.io/couldevlop/nexusrh-ci-api
    tag: latest
  web:
    repository: ghcr.io/couldevlop/nexusrh-ci-web
    tag: latest
  worker:
    repository: ghcr.io/couldevlop/nexusrh-ci-worker
    tag: latest

ingress:
  certIssuer: letsencrypt-prod

api:
  replicas: 1
  env:
    NODE_ENV: production
    LOG_LEVEL: info
  autoscaling:
    enabled: false
  secrets:
    existingSecret: nexusrh-app-secrets

web:
  replicas: 1

worker:
  replicas: 1

# Infra officielle activée (postgres, redis, minio, meilisearch via images officielles)
infra:
  enabled: true

# Bitnami sub-charts désactivés
postgres:
  enabled: false

redis:
  enabled: false

minio:
  enabled: false

meilisearch:
  enabled: false
