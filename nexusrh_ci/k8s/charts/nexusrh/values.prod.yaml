# values.prod.yaml — Surcharges production
# Usage : helm upgrade --install nexusrh . -f values.prod.yaml -f values.secret.yaml
# Remplacer YOUR_DOMAIN et ghcr.io/YOUR_ORG

global:
  domain: nexusrh-ci.openlabconsulting.com
  apiDomain: api.nexusrh-ci.openlabconsulting.com
  imagePullPolicy: Always

images:
  api:
    repository: ghcr.io/couldevlop/nexusrh-ci-api
    tag: latest
  web:
    repository: ghcr.io/couldevlop/nexusrh-ci-web
    tag: latest
  worker:
    repository: ghcr.io/couldevlop/nexusrh-ci-worker
    tag: latest

ingress:
  certIssuer: letsencrypt-prod

api:
  replicas: 1
  env:
    NODE_ENV: production
    LOG_LEVEL: info
  autoscaling:
    enabled: false

web:
  replicas: 1

worker:
  replicas: 1
