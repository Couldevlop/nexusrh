{{- if .Values.infra.enabled }}
{{- $ns := include "nexusrh.namespace" . }}
{{- $rel := .Release.Name }}
# ── PostgreSQL (official image) ───────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $rel }}-postgres-postgresql
  namespace: {{ $ns }}
spec:
  selector:
    app: nexusrh-infra-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $rel }}-infra-postgres
  namespace: {{ $ns }}
spec:
  serviceName: {{ $rel }}-postgres-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: nexusrh-infra-postgres
  template:
    metadata:
      labels:
        app: nexusrh-infra-postgres
        app.kubernetes.io/name: postgresql
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          value: nexusrh
        - name: POSTGRES_DB
          value: nexusrh
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexusrh-postgres-secret
              key: postgres-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command: [pg_isready, -U, nexusrh]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 10Gi
# ── Redis (official image) ────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $rel }}-redis-master
  namespace: {{ $ns }}
spec:
  selector:
    app: nexusrh-infra-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $rel }}-infra-redis
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexusrh-infra-redis
  template:
    metadata:
      labels:
        app: nexusrh-infra-redis
        app.kubernetes.io/name: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: [sh, -c, "redis-server --requirepass $REDIS_PASSWORD --save ''"]
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexusrh-redis-secret
              key: redis-password
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command: [sh, -c, "redis-cli -a $REDIS_PASSWORD ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
# ── MinIO (official image) ────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $rel }}-minio
  namespace: {{ $ns }}
spec:
  selector:
    app: nexusrh-infra-minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $rel }}-infra-minio
  namespace: {{ $ns }}
spec:
  serviceName: {{ $rel }}-minio
  replicas: 1
  selector:
    matchLabels:
      app: nexusrh-infra-minio
  template:
    metadata:
      labels:
        app: nexusrh-infra-minio
        app.kubernetes.io/name: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-10-02T17-50-41Z
        command: [minio, server, /data, --console-address, ":9001"]
        env:
        - name: MINIO_ROOT_USER
          value: nexusrh-minio
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nexusrh-minio-secret
              key: root-password
        ports:
        - containerPort: 9000
        - containerPort: 9001
        readinessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi
# ── Meilisearch (official image) ─────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $rel }}-meilisearch
  namespace: {{ $ns }}
spec:
  selector:
    app: nexusrh-infra-meilisearch
  ports:
  - name: http
    port: 7700
    targetPort: 7700
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $rel }}-infra-meilisearch
  namespace: {{ $ns }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexusrh-infra-meilisearch
  template:
    metadata:
      labels:
        app: nexusrh-infra-meilisearch
        app.kubernetes.io/name: meilisearch
    spec:
      containers:
      - name: meilisearch
        image: getmeili/meilisearch:v1.10
        env:
        - name: MEILI_ENV
          value: production
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: nexusrh-meilisearch-secret
              key: master-key
        ports:
        - containerPort: 7700
        readinessProbe:
          httpGet:
            path: /health
            port: 7700
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: data
          mountPath: /meili_data
      volumes:
      - name: data
        emptyDir: {}
{{- end }}
