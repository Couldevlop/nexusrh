{{/*
  Helm hook : reset des mots de passe admin après chaque rollout API.

  Justifications :
   - Le seed K8s ne tourne PAS automatiquement après un deploy (volontaire,
     pour préserver les données métier de production).
   - Mais sans seed, les hashes bcrypt des comptes démo ne sont jamais
     rafraîchis quand on déploie une nouvelle image avec un changement de
     mot de passe documenté.
   - Conséquence régulièrement constatée : login 401 sur tous les comptes
     démo après un deploy.

  Ce hook lance le script reset-admin-passwords (idempotent, bcrypt 12 rounds,
  conforme OWASP A02) immédiatement après chaque `helm upgrade`.

  Toggle via .Values.maintenance.autoResetPasswordsAfterUpgrade (défaut true).
  Désactiver pour les environnements où les passwords doivent être pilotés
  par un secret externe (vault, etc.).
*/}}
{{- if .Values.maintenance.autoResetPasswordsAfterUpgrade -}}
{{- $ns := include "nexusrh.namespace" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: nexusrh-reset-passwords-{{ .Release.Revision }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: maintenance
    {{- include "nexusrh.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 1800
  backoffLimit: 1
  # Garde-fou : si l'init container ou le script bloque, on échoue proprement
  # après 5 min au lieu de timeouter helm upgrade (10 min par défaut) et de
  # casser tout le rollout.
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: maintenance
        {{- include "nexusrh.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: nexusrh-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          # Service Postgres (Bitnami chart) : <release>-postgres-postgresql
          # Identique à api.yaml — ne pas dupliquer en dur, lire depuis Release.Name.
          command: [sh, -c, "until nc -z {{ .Release.Name }}-postgres-postgresql 5432; do echo 'waiting postgres...'; sleep 3; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
      containers:
        - name: reset
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: Always
          command: ["node", "dist/db/reset-admin-passwords.js"]
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
