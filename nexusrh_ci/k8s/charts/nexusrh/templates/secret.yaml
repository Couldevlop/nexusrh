{{- $ns := include "nexusrh.namespace" . -}}
{{- $rel := .Release.Name -}}
apiVersion: v1
kind: Secret
metadata:
  name: nexusrh-app-secrets
  namespace: {{ $ns }}
  labels:
    {{- include "nexusrh.labels" . | nindent 4 }}
  annotations:
    # Rotation recommandée tous les 30 jours en prod
    secrets.nexusrh.io/rotation-policy: "30d"
type: Opaque
stringData:
  # ── Base de données ──────────────────────────────────────────────────────────
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | required "postgres.auth.password requis" | quote }}
  DATABASE_URL: "postgresql://nexusrh:{{ .Values.postgres.auth.password }}@{{ $rel }}-postgres-postgresql.{{ $ns }}.svc.cluster.local:5432/nexusrh"

  # ── Redis ─────────────────────────────────────────────────────────────────────
  REDIS_PASSWORD: {{ .Values.redis.auth.password | required "redis.auth.password requis" | quote }}

  # ── MinIO ─────────────────────────────────────────────────────────────────────
  S3_ACCESS_KEY: {{ .Values.minio.auth.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.auth.rootPassword | required "minio.auth.rootPassword requis" | quote }}

  # ── Meilisearch ──────────────────────────────────────────────────────────────
  MEILISEARCH_MASTER_KEY: {{ .Values.meilisearch.auth.masterKey | required "meilisearch.auth.masterKey requis" | quote }}

  # ── JWT ───────────────────────────────────────────────────────────────────────
  JWT_SECRET: {{ .Values.api.secrets.jwtSecret | required "api.secrets.jwtSecret requis" | quote }}

  # ── Anthropic IA ──────────────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: {{ .Values.api.secrets.anthropicApiKey | default "" | quote }}

  # ── Email ─────────────────────────────────────────────────────────────────────
  SMTP_USER: {{ .Values.api.secrets.smtpUser | default "" | quote }}
  SMTP_PASS: {{ .Values.api.secrets.smtpPass | default "" | quote }}
  SMTP_FROM: {{ .Values.api.secrets.smtpFrom | default "" | quote }}

  # ── OAuth ─────────────────────────────────────────────────────────────────────
  GOOGLE_CLIENT_ID: {{ .Values.api.secrets.googleClientId | default "" | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.api.secrets.googleClientSecret | default "" | quote }}
  MICROSOFT_CLIENT_ID: {{ .Values.api.secrets.microsoftClientId | default "" | quote }}
  MICROSOFT_CLIENT_SECRET: {{ .Values.api.secrets.microsoftClientSecret | default "" | quote }}
  MICROSOFT_TENANT_ID: {{ .Values.api.secrets.microsoftTenantId | default "common" | quote }}
