{{- $ns := include "nexusrh.namespace" . -}}
# ── API Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusrh-api
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: api
    {{- include "nexusrh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        {{- include "nexusrh.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: nexusrh-api
      automountServiceAccountToken: false
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: [sh, -c, "until pg_isready -h {{ .Release.Name }}-postgres-postgresql -p 5432; do sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            - configMapRef:
                name: nexusrh-config
          env:
            # PostgreSQL — password from cluster secret, URL built with $(VAR) substitution
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-postgres-secret
                  key: postgres-password
            - name: DATABASE_URL
              value: "{{ include "nexusrh.postgresUrl" . }}"
            # Redis
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-redis-secret
                  key: redis-password
            - name: REDIS_URL
              value: "{{ include "nexusrh.redisUrl" . }}"
            # MinIO / S3
            - name: S3_ACCESS_KEY
              value: nexusrh-minio
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-minio-secret
                  key: root-password
            # Meilisearch
            - name: MEILISEARCH_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-meilisearch-secret
                  key: master-key
            # App secrets (key names match what setup-cluster-ci.sh creates)
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: jwt-secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: anthropic-api-key
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: smtp-user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: smtp-pass
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: smtp-from
          resources: {{ toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            failureThreshold: 30
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
  type: ClusterIP
{{- if .Values.api.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexusrh-api-hpa
  namespace: {{ $ns }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexusrh-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexusrh-api-pdb
  namespace: {{ $ns }}
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
