{{- $ns := include "nexusrh.namespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusrh-worker
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: worker
    {{- include "nexusrh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: nexusrh-worker
      automountServiceAccountToken: false
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command: [sh, -c, "until nc -z {{ .Release.Name }}-redis-master 6379; do sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }
      containers:
        - name: worker
          image: "{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: nexusrh-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-postgres-secret
                  key: postgres-password
            - name: DATABASE_URL
              value: "{{ include "nexusrh.postgresUrl" . }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexusrh-redis-secret
                  key: redis-password
            - name: REDIS_URL
              value: "{{ include "nexusrh.redisUrl" . }}"
            - name: S3_ACCESS_KEY
              value: nexusrh-minio
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-minio-secret
                  key: root-password
            - name: MEILISEARCH_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-meilisearch-secret
                  key: master-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: jwt-secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: anthropic-api-key
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: smtp-user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: smtp-pass
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: nexusrh-app-secrets
                  key: smtp-from
          resources: {{ toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command: [node, -e, "require('./dist/health-check.js')"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir: {}
