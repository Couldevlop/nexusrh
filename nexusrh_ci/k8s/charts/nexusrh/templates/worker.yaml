{{- $ns := include "nexusrh.namespace" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusrh-worker
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: worker
    {{- include "nexusrh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: nexusrh-worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command: [sh, -c, "until nc -z {{ .Release.Name }}-redis-master 6379; do sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }
      containers:
        - name: worker
          image: "{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: nexusrh-config
            - secretRef:
                name: nexusrh-app-secrets
          resources: {{ toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command: [node, -e, "require('./dist/health-check.js')"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir: {}
