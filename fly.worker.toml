app = "nexusrh-worker"
primary_region = "cdg"
kill_signal = "SIGINT"
kill_timeout = "30s"   # Workers need more time to finish jobs

[build]
  dockerfile = "apps/worker/Dockerfile"
  target = "production"

[build.args]
  NODE_VERSION = "20"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

# Workers don't serve HTTP — no http_service block
# They connect to BullMQ (Upstash Redis) and process jobs

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  worker = "node dist/index.js"

# No HTTP service — worker is a background process
# Fly will restart it if it crashes (retry 3x with backoff)
[restart]
  policy = "on-failure"
  retries = 5
