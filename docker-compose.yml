version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# NexusRH — Docker Compose
#
#  Démarrage en développement (RECOMMANDÉ) :
#    docker-compose up -d          ← infra uniquement (postgres, redis, meilisearch, minio)
#    pnpm install && pnpm run dev  ← api + web en local avec hot-reload
#
#  Démarrage complet avec conteneurs :
#    docker-compose --profile app up -d
#
#  Production :
#    docker-compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Infrastructure (toujours démarrée) ──────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: nexusrh-postgres
    environment:
      POSTGRES_DB: nexusrh
      POSTGRES_USER: nexusrh
      POSTGRES_PASSWORD: nexusrh
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusrh"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexusrh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: nexusrh-meilisearch
    environment:
      MEILI_MASTER_KEY: nexusrh-dev-master-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: nexusrh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── Application (profil "app" — optionnel en dev, utiliser pnpm run dev) ────

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: nexusrh-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexusrh:nexusrh@postgres:5432/nexusrh
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      S3_ENDPOINT: http://minio:9000
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      # Volumes anonymes pour protéger les node_modules Linux du container
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - api_shared_node_modules:/app/packages/shared/node_modules
    restart: unless-stopped

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      target: development
    container_name: nexusrh-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexusrh:nexusrh@postgres:5432/nexusrh
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./packages/shared/src:/app/packages/shared/src
      - worker_node_modules:/app/node_modules
      - worker_app_node_modules:/app/apps/worker/node_modules
    restart: unless-stopped

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: nexusrh-web
    environment:
      VITE_API_URL: http://localhost:4000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  # Volumes pour les node_modules Linux des conteneurs app
  api_node_modules:
  api_app_node_modules:
  api_shared_node_modules:
  worker_node_modules:
  worker_app_node_modules:
  web_node_modules:
  web_app_node_modules:
