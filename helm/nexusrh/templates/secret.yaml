{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexusrh.fullname" . }}-secrets
  labels:
    {{- include "nexusrh.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "nexusrh.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  redis-url: "redis://:{{ .Values.redis.auth.password }}@{{ include "nexusrh.fullname" . }}-redis-master:6379"
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  smtp-host: {{ .Values.secrets.smtpHost | quote }}
  smtp-user: {{ .Values.secrets.smtpUser | quote }}
  smtp-pass: {{ .Values.secrets.smtpPass | quote }}
  s3-access-key: {{ .Values.secrets.s3AccessKey | quote }}
  s3-secret-key: {{ .Values.secrets.s3SecretKey | quote }}
{{- end }}
