apiVersion: v2
name: nexusrh
description: NexusRH — SIRH SaaS Multi-Tenant. Déploiement Kubernetes on-premise ou cloud.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - hrms
  - hris
  - sirh
  - saas
  - multi-tenant
home: https://github.com/your-org/nexusrh
maintainers:
  - name: Openlab
    email: cti.intelligency@gmail.com

dependencies:
  - name: postgresql
    version: "16.3.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled

  - name: redis
    version: "20.6.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled

  - name: minio
    version: "17.0.21"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: minio.enabled

  - name: meilisearch
    version: "0.10.0"
    repository: "https://meilisearch.github.io/meilisearch-kubernetes"
    condition: meilisearch.enabled
